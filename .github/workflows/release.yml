name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Check tag matches AppConfig.version
        run: |
          VERSION=$(sed -n 's/.*static let version = "\(.*\)".*/\1/p' Sources/ECGBar/AppConfig.swift)
          if [ "v${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match AppConfig.version ${VERSION}" >&2
            exit 1
          fi

      - name: Test
        run: swift test

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Zip
        run: ditto -c -k --keepParent build/ECGBar.app "build/ECGBar-${GITHUB_REF_NAME}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release-notes.md <<'EOF'
          The app is ad-hoc signed (no Apple Developer ID), so macOS quarantines
          the download. After moving ECGBar.app to /Applications, either
          right-click → Open and confirm, or run:

          ```
          xattr -dr com.apple.quarantine /Applications/ECGBar.app
          ```
          EOF
          gh release create "${GITHUB_REF_NAME}" \
            "build/ECGBar-${GITHUB_REF_NAME}.zip" \
            --title "ECGBar ${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes-file /tmp/release-notes.md
