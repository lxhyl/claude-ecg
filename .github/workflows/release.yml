name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

# With the signing secrets configured the app is Developer ID signed and
# notarized; without them it falls back to ad-hoc signing so forks still work.
# Required secrets for signed releases:
#   MACOS_CERTIFICATE          base64 of the "Developer ID Application" .p12
#   MACOS_CERTIFICATE_PASSWORD password of that .p12
#   NOTARY_KEY_ID              App Store Connect API key ID
#   NOTARY_ISSUER_ID           App Store Connect API issuer ID
#   NOTARY_KEY                 contents of the API .p8 private key
jobs:
  release:
    runs-on: macos-15
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
      NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
    steps:
      - uses: actions/checkout@v5

      - name: Check tag matches AppConfig.version
        run: |
          VERSION=$(sed -n 's/.*static let version = "\(.*\)".*/\1/p' Sources/ECGBar/AppConfig.swift)
          if [ "v${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match AppConfig.version ${VERSION}" >&2
            exit 1
          fi

      - name: Test
        run: swift test

      - name: Import Developer ID certificate
        if: env.MACOS_CERTIFICATE != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | sed -n 's/.*"\(Developer ID Application: .*\)".*/\1/p' | head -1)
          if [ -z "$IDENTITY" ]; then
            echo "No Developer ID Application identity found in the imported certificate" >&2
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Notarize and staple
        if: env.MACOS_CERTIFICATE != ''
        run: |
          echo "$NOTARY_KEY" > "$RUNNER_TEMP/notary-key.p8"
          ditto -c -k --keepParent build/ECGBar.app build/notarize.zip
          RESULT=$(xcrun notarytool submit build/notarize.zip \
            --key "$RUNNER_TEMP/notary-key.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait --output-format json)
          echo "$RESULT"
          STATUS=$(echo "$RESULT" | jq -r .status)
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS" >&2
            exit 1
          fi
          xcrun stapler staple build/ECGBar.app

      - name: Zip
        run: ditto -c -k --keepParent build/ECGBar.app "build/ECGBar-${GITHUB_REF_NAME}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$MACOS_CERTIFICATE" ]; then
            printf '%s\n' \
              'Signed with Developer ID and notarized by Apple — download, unzip, and drag ECGBar.app to /Applications.' \
              > /tmp/release-notes.md
          else
            printf '%s\n' \
              'The app is ad-hoc signed, so macOS quarantines the download. After moving ECGBar.app to /Applications, either right-click → Open and confirm, or run:' \
              '' \
              '```' \
              'xattr -dr com.apple.quarantine /Applications/ECGBar.app' \
              '```' \
              > /tmp/release-notes.md
          fi
          gh release create "${GITHUB_REF_NAME}" \
            "build/ECGBar-${GITHUB_REF_NAME}.zip" \
            --title "ECGBar ${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes-file /tmp/release-notes.md
